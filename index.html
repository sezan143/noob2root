      #hero-skeleton h1 { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 700; font-size: clamp(2.25rem, 7vw, 4.5rem); line-height: 1.05; margin: 0 0 1.25rem; letter-spacing: -.02em; }

  <body>
    <div id="root">
      <div id="hero-skeleton">
        <div>
          <div class="badge"><span style="width:.4rem;height:.4rem;border-radius:9999px;background:hsl(157 100% 50%);display:inline-block"></span>Cybersecurity · Linux · DevOps</div>
          <h1>Hack the gap<br/><span class="grad">From Zero to Root.</span></h1>

    <!-- Early LCP image discovery + paint for blog post pages.
         Runs in parallel with the main JS bundle download so the browser can
         start fetching AND PAINT the featured image before React mounts.
         React's createRoot will replace #root content on mount. -->
    <script>
      (function () {
        try {
          var m = location.pathname.match(/^\/blog\/([^\/?#]+)\/?$/);
          if (!m) return;
          var slug = decodeURIComponent(m[1]);
          var BASE = "https://arfvjnbsjroryvchknnq.supabase.co";
          var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFyZnZqbmJzanJvcnl2Y2hrbm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Mjg3OTMsImV4cCI6MjA5NDEwNDc5M30.sBcBPyFRV165Dt1dGxBDuKYOxmPI_Raw9WRTTJMybHU";
          var url = BASE + "/rest/v1/posts?select=featured_image,title&slug=eq." + encodeURIComponent(slug) + "&is_published=eq.true&limit=1";
          function transform(img, w) {
            if (!img) return "";
            if (img.indexOf("/storage/v1/object/public/") > -1) {
              var base = img.replace("/storage/v1/object/public/", "/storage/v1/render/image/public/");
              var sep = base.indexOf("?") > -1 ? "&" : "?";
              return base + sep + "width=" + w + "&quality=70&resize=contain";
            }
            if (img.indexOf("images.unsplash.com") > -1) {
              try {
                var u = new URL(img);
                u.searchParams.set("w", String(w));
                u.searchParams.set("q", "65");
                u.searchParams.set("auto", "format");
                u.searchParams.set("fit", "crop");
                u.searchParams.delete("h");
                return u.toString();
              } catch (e) { return img; }
            }
            return img;
          }
          fetch(url, { headers: { apikey: KEY, Authorization: "Bearer " + KEY, Accept: "application/json" } })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (d) {
              var post = d && d[0];
              var img = post && post.featured_image;
              if (!img) return;
              var widths = [400, 640, 800, 1200];
              var srcset = widths.map(function (w) { return transform(img, w) + " " + w + "w"; }).join(", ");

              // 1. Preload hint (browser starts fetch immediately)
              var link = document.createElement("link");
              link.rel = "preload";
              link.as = "image";
              link.href = transform(img, 800);
              link.setAttribute("imagesrcset", srcset);
              link.setAttribute("imagesizes", "(max-width: 768px) 92vw, 720px");
              link.setAttribute("fetchpriority", "high");
              document.head.appendChild(link);

              // 2. Paint the LCP image into #root BEFORE React mounts.
              //    React's createRoot() replaces #root.innerHTML on mount,
              //    so this is purely a fast first-paint shim.
              var root = document.getElementById("root");
              if (!root || (window).__reactMounted) return;
              var title = (post.title || "").replace(/[<>&]/g, function (c) {
                return c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&amp;";
              });
              root.innerHTML =
                '<div style="min-height:100vh;padding:6rem 1rem 4rem;max-width:48rem;margin:0 auto">' +
                  '<div style="aspect-ratio:16/9;background:hsl(150 8% 14%);border-radius:.75rem;overflow:hidden;margin-bottom:1.5rem">' +
                    '<img src="' + transform(img, 800) + '" srcset="' + srcset + '" ' +
                      'sizes="(max-width: 768px) 92vw, 720px" alt="' + title + '" ' +
                      'width="800" height="450" fetchpriority="high" decoding="async" ' +
                      'style="width:100%;height:100%;object-fit:cover;display:block">' +
                  '</div>' +
                  '<h1 style="font-family:Space Grotesk,Inter,sans-serif;font-size:clamp(1.75rem,4.5vw,2.75rem);line-height:1.15;margin:0;letter-spacing:-.01em">' + title + '</h1>' +
                '</div>';
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
